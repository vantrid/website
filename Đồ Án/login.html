<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            min-height:100vh;
            background:linear-gradient(120deg,#9b59b6,#3498db);
        }
        .card{
            border-radius:15px;
        }
        .btn-gradient{
            background:linear-gradient(to right,#9b59b6,#3498db);
            color:#fff;
            border:none;
        }
        .btn-gradient:hover{
            opacity:0.9;
            color:#fff;
        }
        .hidden{display:none}
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">

                <!-- Đăng nhập -->
                <div id="loginForm">
                    <h3 class="text-center mb-4">Đăng nhập</h3>

                    <div class="mb-3">
                        <label class="form-label">Tên đăng nhập</label>
                        <input type="text" id="loginUser" class="form-control" placeholder="Nhập tài khoản">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" id="loginPass" class="form-control" placeholder="Nhập mật khẩu">
                    </div>

                    <button class="btn btn-gradient w-100" onclick="login()">Đăng nhập</button>

                    <p class="text-center mt-3">
                        Chưa có tài khoản?
                        <a href="#" onclick="showRegister()">Đăng ký</a>
                    </p>
                </div>

                <!-- Đăng ký -->
                <div id="registerForm" class="hidden">
                    <h3 class="text-center mb-4">Đăng ký</h3>

                    <div class="mb-3">
                        <label class="form-label">Tên đăng nhập</label>
                        <input type="text" id="regUser" class="form-control" placeholder="Nhập tài khoản">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" id="regPass" class="form-control" placeholder="Nhập mật khẩu">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nhập lại mật khẩu</label>
                        <input type="password" id="regRePass" class="form-control" placeholder="Nhập lại mật khẩu">
                    </div>

                    <button class="btn btn-gradient w-100" onclick="register()">Đăng ký</button>

                    <p class="text-center mt-3">
                        Đã có tài khoản?
                        <a href="#" onclick="showLogin()">Đăng nhập</a>
                    </p>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function showRegister(){
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
    }
    function showLogin(){
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
    }

    function register(){
        let u = regUser.value.trim();
        let p = regPass.value;
        let rp = regRePass.value;

        if(!u || !p || !rp){
            alert('Vui lòng nhập đầy đủ thông tin');
            return;
        }
        if(p !== rp){
            alert('Mật khẩu không khớp');
            return;
        }
        localStorage.setItem('user',u);
        localStorage.setItem('pass',p);
        alert('Đăng ký thành công');
        showLogin();
    }

    function login(){
        let u = loginUser.value;
        let p = loginPass.value;
        if(u === localStorage.getItem('user') && p === localStorage.getItem('pass')){
            alert('Đăng nhập thành công');
            window.location.href ='index.html';//chuyển sang trang 
        }else{
            alert('Sai tài khoản hoặc mật khẩu');
        }
    }
    
</script>

</body>
</html>
